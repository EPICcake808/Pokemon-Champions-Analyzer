name: CI

# Regression gate for pushes and PRs: runs the Python test suite and the web
# lint/typecheck/build. Kept separate from meta-refresh.yml (which only rebuilds
# the usage board on a schedule).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package (with dev deps)
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        # Fallbacks in src/db/index.ts and src/lib/auth/runtime.ts let the build
        # run without real secrets; this placeholder just silences the warning.
        env:
          AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
        run: npm run build

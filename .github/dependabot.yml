version: 2
updates:
  # Python analyzer/API dependencies declared in pyproject.toml.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Next.js web frontend dependencies.
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Keep the GitHub Actions used by ci.yml / meta-refresh.yml current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
